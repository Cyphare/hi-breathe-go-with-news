<div class="page-title-banner">
    <h2>Research Field</h2>
</div>

<main class="research-main">
    <div class="container relative-container">
        <div class="major-categories">
            {{ range hugo.Data.research.categories }}
            <div class="major-card" data-target="{{ .id }}" data-title="{{ .title }}">
                {{ if .image }}
                <img class="major-img" src="/images/research/{{ .image }}" alt="{{ .title }}">
                {{ else }}
                <img class="major-img" src="/images/design-placeholder.png" alt="Research field">
                {{ end }}
                <div class="major-title">{{ .titleHtml | safeHTML }}</div>
            </div>
            {{ end }}
        </div>
    </div>

    <div id="research-dropdown-wrapper" class="research-dropdown-wrapper">
        <div id="dynamic-banner" class="page-title-banner" style="margin-top: 60px;">
            <h2 id="dynamic-title">Research Field</h2>
        </div>

        <div class="container relative-container" id="project-grids-container">
            {{ range hugo.Data.research.categories }}
            <div id="{{ .id }}" class="project-grid-section">
                {{ range .projects }}
                <div class="project-card">
                    {{ if .image }}
                    <img class="proj-img" src="/images/research/{{ .image }}" alt="{{ .label }}">
                    {{ else }}
                    <img class="proj-img" src="/images/design-placeholder.png" alt="Research project">
                    {{ end }}
                    <div class="proj-label">{{ .label }}</div>
                </div>
                {{ end }}
            </div>
            {{ end }}
        </div>
    </div>

</main>
